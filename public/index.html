<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doc Flock Remote</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Login -->
  <div id="login-screen" class="screen">
    <div class="login-box">
      <h1>DocFlock</h1>
      <p class="login-subtitle">Enter your PIN</p>
      <input type="password" id="pin-input" inputmode="numeric" placeholder="PIN" maxlength="10" autocomplete="off">
      <button id="pin-submit">Unlock</button>
      <p id="pin-error" class="error hidden"></p>
    </div>
  </div>

  <!-- Main App -->
  <div id="app-screen" class="screen hidden">
    <div class="container">
      <div class="top-bar">
        <button id="refresh-btn" class="btn-refresh" title="Refresh">&#x21bb;</button>
        <h1 class="app-title">Doc Flock Remote</h1>
        <div class="top-spacer"></div>
      </div>

      <div class="player-section">
        <!-- Resume prompt -->
        <div id="resume-prompt" class="resume-prompt hidden">
          <span id="resume-text"></span>
          <div class="resume-actions">
            <button id="resume-btn" class="btn-primary">Resume</button>
            <button id="resume-dismiss" class="btn-dismiss">Dismiss</button>
          </div>
        </div>

        <!-- Player card (now playing) -->
        <div id="status-card" class="status-card hidden">
          <div class="status-title" id="status-title"></div>
          <div class="status-meta">
            <span class="status-state" id="status-state"></span>
            <span class="status-langs" id="status-langs"></span>
          </div>

          <!-- Live language switcher -->
          <div id="live-lang-group" class="live-lang-group hidden">
            <div id="live-lang-checkboxes" class="lang-checkboxes"></div>
            <button id="live-lang-apply" class="btn-primary btn-small">Apply</button>
          </div>

          <!-- Seekable progress bar -->
          <div class="progress-row">
            <span class="time-label" id="time-current">0:00</span>
            <div class="progress-bar" id="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="time-label" id="time-total">0:00</span>
          </div>

          <!-- Player controls -->
          <div class="player-controls">
            <button class="btn-skip" id="skip-back-30" title="-30s">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
              <span>30</span>
            </button>
            <button class="btn-skip" id="skip-back-10" title="-10s">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
              <span>10</span>
            </button>

            <button id="pause-btn" class="btn-play-pause" title="Pause / Resume">
              <svg id="pause-icon" viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                <rect x="6" y="4" width="4" height="16"/>
                <rect x="14" y="4" width="4" height="16"/>
              </svg>
              <svg id="play-icon" viewBox="0 0 24 24" width="32" height="32" fill="currentColor" class="hidden">
                <polygon points="5,3 19,12 5,21"/>
              </svg>
            </button>

            <button class="btn-skip" id="skip-fwd-10" title="+10s">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
              <span>10</span>
            </button>
            <button class="btn-skip" id="skip-fwd-30" title="+30s">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
              <span>30</span>
            </button>
          </div>

          <!-- Advanced settings -->
          <details class="advanced-section">
            <summary>Advanced</summary>
            <div class="sync-row">
              <label>Audio sync</label>
              <button class="btn-sync" id="sync-m50">-50</button>
              <button class="btn-sync" id="sync-m10">-10</button>
              <span id="delay-value" class="sync-value">0ms</span>
              <button class="btn-sync" id="sync-p10">+10</button>
              <button class="btn-sync" id="sync-p50">+50</button>
            </div>
          </details>

          <!-- Prev / Next -->
          <div class="track-controls">
            <button id="prev-btn" class="btn-track" title="Previous">&#x23EE; Previous</button>
            <button id="next-btn" class="btn-track" title="Next">Next &#x23ED;</button>
          </div>

          <!-- Autoplay + Stop -->
          <div class="bottom-controls">
            <label class="autoplay-toggle">
              <input type="checkbox" id="autoplay-cb" checked>
              <span>Autoplay next</span>
            </label>
            <button id="stop-btn" class="btn-stop" title="Stop playback">Stop</button>
          </div>
        </div>

        <!-- Queue display -->
        <div id="queue-card" class="queue-card hidden">
          <div class="queue-header">
            <label>Queue (<span id="queue-count">0</span>)</label>
            <button id="queue-clear" class="btn-dismiss">Clear</button>
          </div>
          <ol id="queue-list" class="queue-list"></ol>
        </div>

        <!-- Lecture selector -->
        <div class="select-group">
          <label for="video-select">All Lectures</label>
          <select id="video-select">
            <option value="">Select a lecture...</option>
          </select>
        </div>

        <!-- Multi-language lectures -->
        <div id="multilang-group" class="select-group hidden">
          <label for="multilang-select">Lectures with Multiple Language Subtitles</label>
          <select id="multilang-select">
            <option value="">Select a lecture...</option>
          </select>
        </div>

        <!-- Short Doc Clips selector -->
        <div id="clips-group" class="select-group hidden">
          <label for="clips-select">Short Doc Clips</label>
          <select id="clips-select">
            <option value="">Select a clip...</option>
          </select>
        </div>

        <!-- Music selector -->
        <div class="select-group">
          <label for="music-select">Music</label>
          <select id="music-select">
            <option value="">Select a song...</option>
          </select>
        </div>

        <!-- YouTube cached -->
        <div id="yt-cache-group" class="select-group hidden">
          <label for="yt-select">YouTube Downloads</label>
          <select id="yt-select">
            <option value="">Select a download...</option>
          </select>
        </div>

        <!-- YouTube URL -->
        <div class="url-group">
          <label>YouTube URL</label>
          <div class="url-row">
            <input type="url" id="yt-url" placeholder="Paste YouTube URL..." autocomplete="off">
            <button id="yt-play-btn" class="btn-primary">Download</button>
          </div>
          <div id="yt-status" class="yt-status hidden"></div>
        </div>

        <!-- Language selector -->
        <div id="lang-group" class="lang-group hidden">
          <label>Subtitles</label>
          <div id="lang-checkboxes" class="lang-checkboxes"></div>
        </div>

        <div class="play-row">
          <button id="play-btn" class="btn-primary btn-full" disabled>Play</button>
          <button id="queue-btn" class="btn-queue" disabled title="Add to queue">+ Queue</button>
        </div>

        <div id="error-msg" class="error hidden"></div>
      </div>

      <button id="logout-btn" class="logout-btn" title="Log out">Log out</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
